# Short smoke run on dummy data — verifies the loop end-to-end.
attn_implementation: flash_attention_2
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
num_train_epochs: 1
max_steps: 5
learning_rate: 2.0e-4
warmup_steps: 0
weight_decay: 0.0
lr_scheduler_type: constant
bf16: true
fp16: false
logging_steps: 1
save_strategy: "no"
save_steps: 500
eval_strategy: steps
eval_steps: 3
eval_on_start: true
per_device_eval_batch_size: 1
max_eval_samples: 8
gradient_checkpointing: false
max_length: null
report_to: wandb
seed: 0
use_liger_kernel: false
optim: adamw_torch_fused
