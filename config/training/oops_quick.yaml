# Bounded OOPS train-set run: validates real dataloading + memory.
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
num_train_epochs: 1
max_steps: 200
learning_rate: 2.0e-4
warmup_steps: 10
weight_decay: 0.0
lr_scheduler_type: cosine
bf16: true
fp16: false
logging_steps: 5
save_strategy: steps
save_steps: 100
save_total_limit: 2
gradient_checkpointing: true
max_length: null
report_to: wandb
seed: 0
freeze_visual: true
