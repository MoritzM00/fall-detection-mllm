# Full SFT run. Effective batch = per_device * grad_accum * num_gpus.
# Tune num_train_epochs / max_steps based on dataset size; rule of thumb is
# 2-3 epochs over the train split.

attn_implementation: flash_attention_2
per_device_train_batch_size: 16
gradient_accumulation_steps: 1

num_train_epochs: 3
max_steps: -1  # let epochs decide; set a positive int to cap

learning_rate: 3.0e-4
warmup_ratio: 0.05  # fraction of total steps used for LR warmup
weight_decay: 1e-4
lr_scheduler_type: cosine

adam_beta1: 0.9
adam_beta2: 0.95
adam_epsilon: 1.0e-6

bf16: true
fp16: false

logging_steps: 10

save_strategy: epoch
save_total_limit: 3

eval_strategy: epoch
eval_on_start: true
per_device_eval_batch_size: 16
max_eval_samples: 1000
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

gradient_checkpointing: true
max_length: null
report_to: wandb
seed: 0
use_liger_kernel: true
optim: adamw_torch_fused
