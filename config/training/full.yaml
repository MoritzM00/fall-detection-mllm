# Full SFT run. Effective batch = per_device * grad_accum * num_gpus.
# Tune num_train_epochs / max_steps based on dataset size; rule of thumb is
# 2-3 epochs over the train split.

attn_implementation: flash_attention_2
per_device_train_batch_size: 16
gradient_accumulation_steps: 1

num_train_epochs: 3
max_steps: 500 # -1 for no max steps, otherwise it overrides num_train_epochs

learning_rate: 1e-4
warmup_ratio: 0.1  # fraction of total steps used for LR warmup
weight_decay: 1e-3
max_grad_norm: 1.0
lr_scheduler_type: cosine

bf16: true
fp16: false

logging_steps: 10

save_strategy: steps
save_steps: 100
save_total_limit: 1

eval_strategy: steps
eval_steps: 100
eval_on_start: true
per_device_eval_batch_size: 16
max_eval_samples_per_ds: 1000
load_best_model_at_end: false
metric_for_best_model: null
greater_is_better: true

gradient_checkpointing: true
max_length: null
report_to: wandb
seed: 0
use_liger_kernel: true
optim: adamw_torch_fused
adam_beta1: 0.9
adam_beta2: 0.999

resume_from_checkpoint: null
